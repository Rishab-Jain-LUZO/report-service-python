version: '3.8'

services:
  api:
    build: .
    container_name: python_report_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  worker:
    build: .
    container_name: python_report_worker
    command: celery -A tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: python_report_redis
    ports:
      - "6379:6379"
